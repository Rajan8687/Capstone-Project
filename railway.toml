# Railway Deployment Configuration

[build]
builder = "nixpacks"

[deploy]
startCommand = "export LD_LIBRARY_PATH=/nix/store/ybjcla5bhj8g1y84998pn4a2drfxybkv-gcc-13.3.0-lib/lib startCommand = "export LD_LIBRARY_PATH=/nix/store/ybjcla5bhj8g1y84998pn4a2drfxybkv-gcc-13.3.0-lib/lib startCommand = "gunicorn insightwrite.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --threads 2 --timeout 120"startCommand = "gunicorn insightwrite.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --threads 2 --timeout 120" gunicorn insightwrite.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --threads 2 --timeout 120"startCommand = "gunicorn insightwrite.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --threads 2 --timeout 120"startCommand = "gunicorn insightwrite.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --threads 2 --timeout 120" gunicorn insightwrite.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --threads 2 --timeout 120" gunicorn insightwrite.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --threads 2 --timeout 120"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
healthcheckPath = "/";
healthcheckTimeout = 300

# Set environment variables
[deploy.env]
PYTHON_VERSION = "3.11"
NIXPACKS_PYTHON_VERSION = "3.11"
PORT = "8000"

# Variables that Railway will auto-provide:
# - DATABASE_URL (PostgreSQL)
# - SECRET_KEY
# - PORT
# - RAILWAY_STATIC_URL
